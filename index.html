<!DOCTYPE html>
<html>
<head>

    button { padding:10px 20px; background:blue; color:white; border:none; margin-top:10px; cursor:pointer; }
    .card { background:white; padding:15px; margin-top:20px; border-radius:8px; box-shadow:0px 0px 5px rgba(0,0,0,0.2);}
    table { border-collapse: collapse; width:100%; margin-top:10px; }
    th, td { border:1px solid #ccc; padding:8px; text-align:left; }
    th { background:#eee; }
    .section-title { color:#333; margin-top:15px; }
    .note { font-style:italic; color:#555; margin-top:5px; }
  </style>
</head>
<body>

<input type="time" id="mTime">

<br>
<button onclick="generatePDF()">📄 Generate PDF</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  </div>
  `;
}

// Smart Multi-Page PDF
function generatePDF() {
  const sections = document.querySelectorAll("#report .card");
  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF('p','pt','a4');
  const pdfWidth = pdf.internal.pageSize.getWidth();
  const pdfHeight = pdf.internal.pageSize.getHeight();
  let cursorY = 0;

  const processSection = (index) => {
    if(index >= sections.length) {
      pdf.save("Horoscope_Report.pdf");
      return;
    }

    const section = sections[index];

    html2canvas(section, { scale:2 }).then(canvas => {
      const imgData = canvas.toDataURL('image/png');
      const imgProps = pdf.getImageProperties(imgData);

      const imgWidth = pdfWidth;
      const imgHeight = (imgProps.height * imgWidth) / imgProps.width;

      if(cursorY + imgHeight > pdfHeight) {
        pdf.addPage();
        cursorY = 0;
      }

      pdf.addImage(imgData, 'PNG', 0, cursorY, imgWidth, imgHeight);
      cursorY += imgHeight + 10;

      processSection(index + 1);
    });
  }

  processSection(0);
}
</script>

</body>
</html>
